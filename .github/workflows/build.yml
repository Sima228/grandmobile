name: Build Grand Mobile APK

on:
  push:
    branches: [ "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    # Устанавливаем переменные окружения для всего процесса
    env:
      NODE_OPTIONS: "--max-old-space-size=4096"
      GRADLE_OPTS: "-Dorg.gradle.jvmargs='-Xmx4g -XX:MaxMetaspaceSize=1g --add-opens java.base/java.io=ALL-UNNAMED --add-opens java.base/java.lang=ALL-UNNAMED --add-opens java.base/java.util=ALL-UNNAMED --add-opens java.base/java.lang.invoke=ALL-UNNAMED'"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu' # Zulu часто стабильнее работает со старым Gradle
          cache: 'gradle'

      - name: Install Dependencies
        # Используем --legacy-peer-deps, так как проекту 4 года
        run: npm install --legacy-peer-deps

      - name: Prepare Android Environment
        # 1. Прописываем флаги в gradle.properties (на случай если Gradle игнорирует env)
        # 2. Включаем Jetifier для совместимости старых библиотек с AndroidX
        run: |
          mkdir -p android
          touch android/gradle.properties
          echo "org.gradle.jvmargs=-Xmx4g -XX:MaxMetaspaceSize=1g --add-opens java.base/java.io=ALL-UNNAMED --add-opens java.base/java.lang=ALL-UNNAMED --add-opens java.base/java.util=ALL-UNNAMED --add-opens java.base/java.lang.invoke=ALL-UNNAMED" >> android/gradle.properties
          echo "android.useAndroidX=true" >> android/gradle.properties
          echo "android.enableJetifier=true" >> android/gradle.properties
          echo "org.gradle.daemon=false" >> android/gradle.properties

      - name: Build APK (Debug)
        run: |
          cd android
          chmod +x gradlew
          # Сначала чистим, потом собираем с полной трассировкой ошибок
          ./gradlew clean assembleDebug --stacktrace --info

      - name: Upload Success APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: GrandMobile-Ready
          path: android/app/build/outputs/apk/debug/app-debug.apk

      - name: Upload Error Logs (Only on Failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-failure-report
          path: |
            android/app/build/reports/
            **/build/reports/issues/
