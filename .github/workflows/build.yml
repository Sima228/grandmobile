name: Build Grand Mobile APK

on:
  push:
    branches: [ "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      NODE_OPTIONS: "--max-old-space-size=4096"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'
          cache: 'gradle'

      - name: Install Dependencies
        run: npm install --legacy-peer-deps

      - name: Force Project Repair
        run: |
          mkdir -p android
          # 1. Восстанавливаем ключевые переменные
          echo "FLIPPER_VERSION=0.99.0" > android/gradle.properties
          echo "org.gradle.jvmargs=-Xmx4g -XX:MaxMetaspaceSize=1g --add-opens java.base/java.io=ALL-UNNAMED --add-opens java.base/java.lang=ALL-UNNAMED --add-opens java.base/java.util=ALL-UNNAMED --add-opens java.base/java.lang.invoke=ALL-UNNAMED" >> android/gradle.properties
          echo "android.useAndroidX=true" >> android/gradle.properties
          echo "android.enableJetifier=true" >> android/gradle.properties
          
          # 2. Игнорируем ошибки дубликатов ресурсов (Critical Fix)
          echo "android.disableResourceValidation=true" >> android/gradle.properties
          
          # 3. Хак против ошибки "Duplicate Resources" (удаляем старые кэшированные иконки)
          rm -rf android/app/src/main/res/drawable-* || true
          rm -rf android/app/src/main/res/raw || true

      - name: Build APK (Debug)
        run: |
          cd android
          chmod +x gradlew
          # Используем флаг -P чтобы прокинуть настройки напрямую в сборку
          ./gradlew assembleDebug \
            --no-daemon \
            -x lint \
            -x test \
            -Pandroid.nonTransitiveRClass=false \
            --stacktrace

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: GrandMobile-Ready-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk

      - name: Find Exact Error (If Failed)
        if: failure()
        run: |
          echo "--- АНАЛИЗ ОШИБКИ ---"
          # Ищем самое важное сообщение об ошибке в логах
          grep -iR "error" android/app/build/reports || echo "Детальных отчетов нет, проверь лог выше"
