name: Build Grand Mobile APK

on:
  push:
    branches: [ "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      NODE_OPTIONS: "--max-old-space-size=4096"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'

      - name: Accept Android Licenses
        # Иногда сборка падает, потому что "не приняты условия использования SDK"
        run: yes | sdkmanager --licenses || true

      - name: Install Dependencies
        run: npm install --legacy-peer-deps

      - name: Inject Fixes
        run: |
          mkdir -p android
          # Создаем чистый gradle.properties с флагами для Java 17
          echo "org.gradle.jvmargs=-Xmx4g -XX:MaxMetaspaceSize=1g --add-opens java.base/java.io=ALL-UNNAMED --add-opens java.base/java.lang=ALL-UNNAMED --add-opens java.base/java.util=ALL-UNNAMED --add-opens java.base/java.lang.invoke=ALL-UNNAMED" > android/gradle.properties
          echo "android.useAndroidX=true" >> android/gradle.properties
          echo "android.enableJetifier=true" >> android/gradle.properties
          echo "org.gradle.daemon=false" >> android/gradle.properties

      - name: Build APK (Debug)
        run: |
          cd android
          chmod +x gradlew
          # Флаг --stacktrace покажет саму ошибку прямо в логах GitHub
          ./gradlew assembleDebug --stacktrace --no-daemon

      - name: Upload APK on Success
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: GrandMobile-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk

      - name: Force Show Error (If Failed)
        if: failure()
        run: |
          echo "!!! ОШИБКА НАЙДЕНА !!!"
          echo "Прокрути лог шага 'Build APK (Debug)' ВВЕРХ до слов 'What went wrong:'"
