name: Build Grand Mobile APK

on:
  push:
    branches: [ "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install dependencies
        run: npm install --force

      - name: Build APK
        uses: futureware-tech/react-native-build-action@v1
        with:
          entry: android

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: grandmobile-app
          path: android/app/build/outputs/apk/debug/app-debug.apk
