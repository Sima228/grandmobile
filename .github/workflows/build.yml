name: Build Grand Mobile APK

on:
  push:
    branches: [ "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Для React Native 0.67 лучше всего подходит Node 16
      - name: Setup Node.js 16
        uses: actions/setup-node@v4
        with:
          node-version: 16

      # Java 11 — это стандарт стабильности для старых версий RN
      - name: Setup JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'zulu'
          cache: 'gradle'

      - name: Install Dependencies
        run: npm install --legacy-peer-deps

      - name: Fix Android Environment
        run: |
          mkdir -p android
          # Создаем чистый gradle.properties специально для версии 0.67
          cat <<EOF > android/gradle.properties
          FLIPPER_VERSION=0.99.0
          android.useAndroidX=true
          android.enableJetifier=true
          # Ограничиваем память, чтобы билд не вылетал
          org.gradle.jvmargs=-Xmx2048m -XX:MaxMetaspaceSize=512m
          EOF
          
          # Удаляем старые следы сборки
          cd android && ./gradlew clean

      - name: Build APK (Debug)
        run: |
          cd android
          chmod +x gradlew
          # Собираем, отключая все проверки (Lint, Тесты), которые тормозят процесс
          ./gradlew assembleDebug -x lint -x test --no-daemon

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: GrandMobile-Build
          path: android/app/build/outputs/apk/debug/app-debug.apk

      - name: Failure Logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: Debug-Logs
          path: android/app/build/outputs/logs/
