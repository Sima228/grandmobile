name: Build Grand Mobile APK

on:
  push:
    branches: [ "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      NODE_OPTIONS: "--max-old-space-size=4096"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'
          cache: 'gradle'

      - name: Accept Android Licenses
        run: yes | sdkmanager --licenses || true

      - name: Install Dependencies
        run: npm install --legacy-peer-deps

      - name: Deep Repair Project
        run: |
          mkdir -p android
          # Создаем идеальный конфиг (перезаписываем всё)
          cat <<EOF > android/gradle.properties
          FLIPPER_VERSION=0.99.0
          org.gradle.jvmargs=-Xmx4g -XX:MaxMetaspaceSize=1g --add-opens java.base/java.io=ALL-UNNAMED --add-opens java.base/java.lang=ALL-UNNAMED --add-opens java.base/java.util=ALL-UNNAMED --add-opens java.base/java.lang.invoke=ALL-UNNAMED
          android.useAndroidX=true
          android.enableJetifier=true
          android.disableResourceValidation=true
          EOF
          
          # Чистим проблемные папки
          rm -rf android/app/src/main/res/drawable-* || true
          rm -rf android/app/build/generated || true

      - name: Build APK (Debug)
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon -x lint -x test --stacktrace

      - name: Upload APK on Success
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: GrandMobile-Success-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk

      - name: Upload Logs on Failure
        if: failure() # ЭТОТ АРТЕФАКТ ПОЯВИТСЯ ПРИ ОШИБКЕ
        uses: actions/upload-artifact@v4
        with:
          name: Error-Logs
          path: |
            android/app/build/reports/
            android/app/build/logs/
