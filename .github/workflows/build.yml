name: Build Grand Mobile APK

on:
  push:
    branches: [ "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v2

      - name: Install Node.js dependencies
        run: |
          npm install --force

      - name: Build APK (debug)
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --stacktrace --info --debug

      - name: Show Gradle error log
        if: failure()
        run: |
          echo "===== Last 100 lines of Gradle daemon log ====="
          tail -n 100 /home/runner/.gradle/daemon/*/daemon-*.log 2>/dev/null || echo "No daemon log found"

      - name: Upload full Gradle log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: gradle-daemon-log
          path: /home/runner/.gradle/daemon/*/daemon-*.log

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: grandmobile-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
