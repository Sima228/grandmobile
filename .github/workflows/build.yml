name: Build Grand Mobile APK

on:
  push:
    branches: [ "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install dependencies
        run: |
          npm install --force

      - name: Build Android
        id: build
        continue-on-error: true
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --stacktrace

      - name: Show error log if failed
        if: steps.build.outcome == 'failure'
        run: |
          echo "===== GRADLE BUILD FAILED ====="
          echo "Last 100 lines of Gradle daemon log:"
          tail -n 100 /home/runner/.gradle/daemon/*/daemon-*.log 2>/dev/null || echo "No daemon log found"
          echo "===== END OF LOG ====="
          exit 1

      - name: Upload APK
        if: steps.build.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: grandmobile-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
