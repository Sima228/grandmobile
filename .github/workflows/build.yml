name: Build Grand Mobile APK

on:
  push:
    branches: [ "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: |
          npm install --force
          npm install --save-dev @babel/plugin-transform-private-property-in-object

      - name: Clean and Build Android
        id: build
        continue-on-error: true
        run: |
          cd android
          chmod +x gradlew
          ./gradlew clean
          ./gradlew assembleDebug --stacktrace --info --no-daemon

      - name: Collect all logs on failure
        if: steps.build.outcome == 'failure'
        run: |
          mkdir -p full-logs
          find /home/runner/.gradle -name "*.log" -exec cp {} full-logs/ \; 2>/dev/null || true
          find /home/runner/work -name "*.log" -exec cp {} full-logs/ \; 2>/dev/null || true
          find . -name "*.log" -exec cp {} full-logs/ \; 2>/dev/null || true
          cat /home/runner/.gradle/daemon/*/daemon-*.log > full-logs/daemon-combined.log 2>/dev/null || true
          echo "===== LAST 500 LINES OF BUILD LOG ====="
          tail -n 500 /home/runner/.gradle/daemon/*/daemon-*.log 2>/dev/null || echo "No daemon log"
          echo "===== END OF LOG ====="

      - name: Upload full logs
        if: steps.build.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: full-build-logs
          path: full-logs/

      - name: Upload APK
        if: steps.build.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: grandmobile-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
