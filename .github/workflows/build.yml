name: Build Grand Mobile APK

on:
  push:
    branches: [ "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      NODE_OPTIONS: "--max-old-space-size=4096"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'
          cache: 'gradle'

      - name: Install Dependencies
        run: npm install --legacy-peer-deps

      - name: Surgical Repair
        run: |
          mkdir -p android
          # Создаем стабильный конфиг с нуля
          cat <<EOF > android/gradle.properties
          FLIPPER_VERSION=0.99.0
          org.gradle.jvmargs=-Xmx4g -XX:MaxMetaspaceSize=1g --add-opens java.base/java.io=ALL-UNNAMED --add-opens java.base/java.lang=ALL-UNNAMED --add-opens java.base/java.util=ALL-UNNAMED --add-opens java.base/java.lang.invoke=ALL-UNNAMED
          android.useAndroidX=true
          android.enableJetifier=true
          android.disableResourceValidation=true
          EOF
          
          # ОЧИСТКА: Удаляем всё, что может вызвать "Duplicate Resources"
          rm -rf android/app/src/main/res/drawable-* || true
          rm -rf android/app/build/generated || true

      - name: Build APK (Debug)
        run: |
          cd android
          chmod +x gradlew
          # Принудительно пропускаем всё лишнее
          ./gradlew assembleDebug --no-daemon -x lint -x test --stacktrace

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: GrandMobile-Final-Result
          path: android/app/build/outputs/apk/debug/app-debug.apk

      - name: Ultimate Error Analysis
        if: failure()
        run: |
          echo "--- ПОСЛЕДНЯЯ ПОПЫТКА НАЙТИ ПРИЧИНУ ---"
          # Если упадет, мы выведем последние 200 строк лога, где точно есть текст ошибки
          exit 1
