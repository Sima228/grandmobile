name: Build Grand Mobile APK

on:
  push:
    branches: [ "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Для React Native 0.67 Node 16 — это самая стабильная версия
      - name: Setup Node.js 16
        uses: actions/setup-node@v4
        with:
          node-version: 16

      # Твой проект старый, Java 11 исправит ошибки памяти
      - name: Setup JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'zulu'
          cache: 'gradle'

      - name: Install Dependencies
        run: npm install --legacy-peer-deps

      - name: Fix and Clean
        run: |
          mkdir -p android
          echo "FLIPPER_VERSION=0.99.0" > android/gradle.properties
          echo "android.useAndroidX=true" >> android/gradle.properties
          echo "android.enableJetifier=true" >> android/gradle.properties
          # Чистим старые ошибки
          cd android && ./gradlew clean

      - name: Build APK (Debug)
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon -x lint -x test

      - name: Upload Final APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: Grand-Mobile-Game
          path: android/app/build/outputs/apk/debug/app-debug.apk

      - name: Upload Logs (If Error)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: Error-Reports
          path: android/app/build/reports/
