name: Build Grand Mobile APK

on:
  push:
    branches: [ "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      NODE_OPTIONS: "--max-old-space-size=4096"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'
          cache: 'gradle'

      - name: Install Dependencies
        run: npm install --legacy-peer-deps

      - name: Restore and Fix Gradle Properties
        run: |
          mkdir -p android
          # Создаем файл, если его нет, и добавляем ВЕРСИЮ FLIPPER (которую мы случайно стерли)
          echo "FLIPPER_VERSION=0.99.0" >> android/gradle.properties
          
          # Добавляем флаги совместимости Java 17 (через >> чтобы не стирать старое)
          echo "org.gradle.jvmargs=-Xmx4g -XX:MaxMetaspaceSize=1g --add-opens java.base/java.io=ALL-UNNAMED --add-opens java.base/java.lang=ALL-UNNAMED --add-opens java.base/java.util=ALL-UNNAMED --add-opens java.base/java.lang.invoke=ALL-UNNAMED" >> android/gradle.properties
          echo "android.useAndroidX=true" >> android/gradle.properties
          echo "android.enableJetifier=true" >> android/gradle.properties
          
          # Отключаем строгую проверку ошибок в коде
          echo "android.lintOptions.abortOnError=false" >> android/gradle.properties

      - name: Build APK (Debug)
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: GrandMobile-Success
          path: android/app/build/outputs/apk/debug/app-debug.apk
