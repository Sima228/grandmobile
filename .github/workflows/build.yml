name: Build Android APK

on:
  push:
    branches:
      - main
      - master # Оставь ту ветку, которую используешь
  workflow_dispatch: # Позволяет запускать сборку вручную из интерфейса GitHub

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '16' # Оптимально для старых React Native проектов

      - name: Install npm dependencies
        run: npm install --legacy-peer-deps
        # --legacy-peer-deps помогает обойти конфликты старых версий пакетов

      - name: Setup Java 17
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: Fix Java 17 Compatibility (The Magic Step)
        # Этот шаг автоматически добавляет нужные флаги в gradle.properties
        run: |
          echo "org.gradle.jvmargs=-Xmx2048m --add-opens java.base/java.io=ALL-UNNAMED --add-opens java.base/java.lang=ALL-UNNAMED --add-opens java.base/java.util=ALL-UNNAMED --add-opens java.base/java.lang.invoke=ALL-UNNAMED" >> android/gradle.properties

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build Release APK
        run: |
          cd android
          ./gradlew assembleRelease --no-daemon

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: GrandMobile-Release-APK
          path: android/app/build/outputs/apk/release/app-release.apk
